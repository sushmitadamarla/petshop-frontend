<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endpoint Test - PetShop Dev Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">&#128062; PetShop Dev Portal</div>
    <div class="nav-user">
        <div class="nav-links">
            <a th:href="@{/contributors}">Contributors</a>
            <a th:href="@{/dashboard}">Dashboard</a>
        </div>
        <span th:text="${session.loggedInUser.name}">User</span>
        <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="breadcrumb">
        <a th:href="@{/contributors}">Contributors</a> &gt;
        <a th:href="@{/contributors/{id}(id=${contributor.id})}" th:text="${contributor.name}">Contributor</a> &gt;
        Endpoint Test
    </div>

    <section class="card">
        <div class="endpoint-header">
            <h1>Test Endpoint</h1>
            <span th:class="${'badge badge-' + #strings.toLowerCase(method)}" th:text="${method}">GET</span>
        </div>

        <p class="endpoint-meta">Path Template: <span class="code" th:text="${path}">/api/v1/path</span></p>
        <p class="endpoint-meta" th:if="${resolvedPath != null}">Resolved Path: <span class="code" th:text="${resolvedPath}">/api/v1/path</span></p>

        <form th:action="@{/endpoint/{id}(id=${contributor.id})}" method="post">
            <input type="hidden" name="path" th:value="${path}">
            <input type="hidden" name="method" th:value="${method}">

            <div class="form-grid" th:if="${pathParams != null and !#lists.isEmpty(pathParams)}">
                <div class="form-group" th:each="pp : ${pathParams}">
                    <label th:for="${'path_' + pp}" th:text="${pp} + ' (Path Param)'"></label>
                    <input type="text" th:id="${'path_' + pp}" th:name="${'path_' + pp}" th:value="${pathValues[pp]}">
                </div>
            </div>
            <p class="subtitle" th:if="${pathParams == null or #lists.isEmpty(pathParams)}">This endpoint does not require input parameters.</p>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Execute Request</button>
                <a th:href="@{/contributors/{id}(id=${contributor.id})}" class="btn-secondary">Back to Profile</a>
            </div>
        </form>
    </section>

    <section class="card" th:if="${statusCode != null}" style="margin-top: 18px;">
        <p class="status-line">Status Code: <span th:text="${statusCode}">200</span></p>
        <span class="status-badge" th:classappend="${statusCode >= 200 and statusCode < 400} ? ' status-success' : ' status-failed'"
              th:text="${statusCode >= 200 and statusCode < 400} ? 'SUCCESS' : 'FAILED'">SUCCESS</span>
