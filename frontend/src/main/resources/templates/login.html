<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PetShop Dev Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="icon">&#128062;</div>
            <h1>PetShop Dev Portal</h1>
            <p class="subtitle">Sign in to test your team endpoints</p>
        </div>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        
    <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>

        <p style="text-align:center; margin-top:16px; font-size:0.9rem; color:var(--text-muted,#666);">
            Don't have an account?
            <a th:href="@{/register}" style="color:var(--primary,#1F7AE0); text-decoration:none; font-weight:600;">Create one</a>
        </p>
    </div>
</div>
</body>
</html>
