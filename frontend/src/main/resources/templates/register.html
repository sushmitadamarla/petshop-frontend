<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PetShop Dev Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="icon">&#128062;</div>
            <h1>PetShop Dev Portal</h1>
            <p class="subtitle">Create an account to explore GET endpoints</p>
        </div>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min. 6 characters" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <p style="text-align:center; margin-top:16px; font-size:0.9rem; color:var(--text-muted, #666);">
            Already have an account?
            <a th:href="@{/login}" style="color:var(--primary,#1F7AE0); text-decoration:none; font-weight:600;">Sign in</a>
        </p>

        <div class="info-box" style="margin-top:18px; padding:12px 16px; background:#f0f6ff;
             border-left:3px solid #1F7AE0; border-radius:6px; font-size:0.85rem; color:#444;">
            <strong>Note:</strong> Self-registered accounts can browse and test all
            <strong>GET</strong> endpoints. To call POST / PUT endpoints you need a
            team-member account.
        </div>
    </div>
</div>
</body>
</html>
