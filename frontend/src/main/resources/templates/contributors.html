<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributors - PetShop Dev Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">&#128062; PetShop Dev Portal</div>
    <div class="nav-user">
        <div class="nav-links">
            <a th:href="@{/contributors}">Contributors</a>
            <a th:href="@{/dashboard}">Dashboard</a>
        </div>
        <span th:text="${session.loggedInUser.name}">User</span>
        <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Project: PetShop Management System</h1>
        <p class="subtitle">Team Contributors</p>
    </div>

    <div class="contributor-grid">
        <article class="card contributor-card" th:each="c : ${contributors}">
            <img class="avatar" th:src="@{${c.profilePicUrl}}" th:alt="${c.name}" onerror="this.src='https://ui-avatars.com/api/?name=Pet+Shop&background=1F7AE0&color=ffffff&size=120';this.onerror=null;">
            <h3 class="contributor-name" th:text="${c.name}">Name</h3>
            <p class="contributor-role" th:text="${c.role}">Role</p>
            <p class="contributor-desc" th:text="${c.description}">Description</p>
            <a th:href="@{/contributors/{id}(id=${c.id})}" class="btn-view">View Profile</a>
        </article>
    </div>
</div>
</body>
</html>
